<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리포트 제목 | 공고 분석 리포트</title>

  <!-- Syne (Display font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Pretendard Variable (Body font) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ① 헤더: 뷰 토글 + 스크롤 프로그레스바 -->
  <header class="site-header">
    <div class="header-inner">
      <span class="header-tag">공고 분석 리포트</span>
      <div class="view-toggle">
        <button class="toggle-btn active" data-view="magazine" aria-label="매거진 뷰">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          매거진
        </button>
        <button class="toggle-btn" data-view="card" aria-label="카드 뷰">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          카드
        </button>
      </div>
    </div>
    <div class="progress-bar" id="progressBar"></div>
  </header>

  <!-- ② 리포트 타이틀 히어로 -->
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-badge">청년주택 공고 분석</div>
      <h1 class="hero-title" id="reportTitle"><span class="skeleton skeleton-title"></span></h1>
      <p class="hero-subtitle" id="reportSubtitle"><span class="skeleton skeleton-subtitle"></span></p>
      <div class="hero-meta">
        <span id="readingTime" class="reading-time-badge"></span>
      </div>
    </div>
  </section>

  <!-- ③ 뷰 컨테이너 -->
  <main class="view-container">

    <!-- 매거진 뷰 (기본 활성) -->
    <div class="view magazine-view active" id="magazineView">
      <!-- 좌측 목차 사이드바 -->
      <aside class="section-index" id="sectionIndex">
        <p class="section-index-title">목차</p>
        <ul class="section-index-list" id="sectionIndexList">
          <!-- JS로 동적 삽입 예정 -->
          <li><a href="#">섹션이 로드되면 표시됩니다</a></li>
        </ul>
      </aside>

      <!-- 우측 본문 -->
      <article class="article-body">
        <div id="loadingSkeleton" class="loading-skeleton">
          <div class="skeleton-section">
            <div class="skeleton skeleton-line w-40"></div>
            <div class="skeleton skeleton-line w-80"></div>
            <div class="skeleton skeleton-line w-60"></div>
          </div>
          <div class="skeleton-section">
            <div class="skeleton skeleton-line w-30"></div>
            <div class="skeleton skeleton-line w-90"></div>
            <div class="skeleton skeleton-line w-70"></div>
            <div class="skeleton skeleton-line w-50"></div>
          </div>
        </div>
        <div id="summaryCard"></div>
        <div id="introBlock"></div>
        <div id="articleBody"></div>
        <div id="outroBlock"></div>
      </article>
    </div>

    <!-- 카드 뷰 -->
    <div class="view card-view" id="cardView">
      <div class="cards-grid" id="cardsGrid">
        <!-- JS로 동적 삽입 예정 -->
      </div>
    </div>

  </main>

  <!-- ④ 푸터 -->
  <footer class="site-footer">
    <p>© 고방 (gobang.kr)</p>
  </footer>

  <script type="module" src="js/app.js"></script>

<!-- Mobile TOC FAB + Drawer -->
<button class="toc-fab" id="tocFab" aria-label="목차 열기" aria-expanded="false">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
    <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
  </svg>
</button>

<div class="toc-drawer" id="tocDrawer" aria-hidden="true">
  <div class="toc-drawer-handle"></div>
  <div class="toc-drawer-inner">
    <p class="toc-drawer-title">목차</p>
    <ul class="toc-drawer-list" id="tocDrawerList"></ul>
  </div>
</div>
<div class="toc-overlay" id="tocOverlay"></div>
</body>
</html>
