<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공고 분석 리포트</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Pretendard Variable (모든 폰트 통일) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <section class="index-page-hero">
    <h1>
      <svg class="index-page-hero-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect width="20" height="20" rx="4.5" fill="#2563EB"/>
        <rect x="5" y="3.4" width="10" height="13.2" rx="1.9" fill="#fff"/>
        <rect x="7" y="6.2" width="6" height="1.6" rx=".8" fill="#FFC84D"/>
        <rect x="7" y="9" width="6" height="1.5" rx=".75" fill="#93C5FD"/>
        <rect x="7" y="11.5" width="6" height="1.5" rx=".75" fill="#93C5FD"/>
        <rect x="7" y="14" width="3.5" height="1.5" rx=".75" fill="#93C5FD"/>
      </svg>
      공고 분석 리포트
    </h1>
    <p>청년주택, 줍줍분양, 민간임대 공고를 빠르게 분석해드려요.</p>
  </section>

  <main class="index-content">
    <!-- 로딩 스켈레톤 -->
    <div id="listSkeleton" aria-hidden="true">
      <div class="skeleton sk-hero"></div>
      <div class="sk-grid">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
      </div>
    </div>

    <!-- 히어로 카드 -->
    <div id="heroCard" style="display:none"></div>

    <!-- 검색 + 정렬/필터 -->
    <div class="list-controls" id="listControls" style="display:none">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M8.5 2a6.5 6.5 0 1 0 3.98 11.64l3.94 3.94a1 1 0 0 0 1.42-1.42l-3.94-3.94A6.5 6.5 0 0 0 8.5 2Zm0 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Z"/></svg>
        <input id="searchInput" type="search" placeholder="공고명 검색" aria-label="공고명 검색" autocomplete="off">
      </div>
      <div class="sort-toggle" role="group" aria-label="정렬 및 필터">
        <button type="button" class="sort-btn active" data-sort="latest" aria-pressed="true">최신순</button>
        <button type="button" class="sort-btn" data-sort="open" aria-pressed="false">모집중</button>
      </div>
    </div>

    <!-- 채널 필터 (채널이 2종 이상일 때만 노출) -->
    <div class="channel-filter" id="channelFilter" style="display:none" role="group" aria-label="채널 필터"></div>

    <!-- 그리드 -->
    <div id="gridSection" style="display:none">
      <div class="reports-grid" id="reportsGrid"></div>
      <p class="no-results" id="noResults" style="display:none">검색 결과가 없어요.</p>
      <nav class="pagination" id="pagination" style="display:none" aria-label="페이지 이동"></nav>
    </div>

    <!-- 빈 상태 -->
    <div class="empty-state" id="emptyState" style="display:none">
      <svg class="empty-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M4 2.5A1.5 1.5 0 0 1 5.5 1h5.09a1.5 1.5 0 0 1 1.06.44l3.91 3.91A1.5 1.5 0 0 1 16 6.41V17.5A1.5 1.5 0 0 1 14.5 19h-9A1.5 1.5 0 0 1 4 17.5v-15Zm7 .91V6a.5.5 0 0 0 .5.5h2.59L11 3.41Z"/></svg>
      <p class="empty-title">아직 등록된 리포트가 없어요</p>
      <p>새 공고 분석 리포트가 준비되면 이곳에 올라와요.</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 고방 (gobang.kr)</p>
  </footer>

  <script>
  (function () {
    var PAGE_SIZE = 6;

    var ICON = {
      cal:  '<svg class="cal-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M6.5 1.75a.9.9 0 0 1 .9.9V3.2h5.2v-.55a.9.9 0 1 1 1.8 0V3.2h.35A2.5 2.5 0 0 1 17.25 5.7v8.6a2.5 2.5 0 0 1-2.5 2.5H5.25a2.5 2.5 0 0 1-2.5-2.5V5.7a2.5 2.5 0 0 1 2.5-2.5h.35v-.55a.9.9 0 0 1 .9-.9ZM4.55 7.9v6.4c0 .39.31.7.7.7h9.5a.7.7 0 0 0 .7-.7V7.9H4.55Z"/></svg>',
      chevL:'<svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M12.28 4.72a1 1 0 0 1 0 1.41L8.4 10l3.88 3.87a1 1 0 1 1-1.41 1.42l-4.59-4.58a1 1 0 0 1 0-1.42l4.59-4.58a1 1 0 0 1 1.41 0Z"/></svg>',
      chevR:'<svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M7.72 4.72a1 1 0 0 0 0 1.41L11.6 10l-3.88 3.87a1 1 0 1 0 1.41 1.42l4.59-4.58a1 1 0 0 0 0-1.42L9.13 4.72a1 1 0 0 0-1.41 0Z"/></svg>'
    };

    var CH_ICON = {
      youth:   '<svg class="channel-badge-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><circle cx="10" cy="6.8" r="3.4"/><path d="M3.6 17.2c0-3.9 2.9-6.4 6.4-6.4s6.4 2.5 6.4 6.4a1 1 0 0 1-1 1H4.6a1 1 0 0 1-1-1Z"/></svg>',
      bunyang: '<svg class="channel-badge-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M11.2 1.5 3.8 11.6h4.4l-1.4 6.9 8-10.8h-4.6z"/></svg>',
      minjian: '<svg class="channel-badge-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><rect x="5" y="3" width="10" height="13.5" rx="1"/><rect x="6.6" y="5" width="2" height="2" rx="0.4" fill="#fff"/><rect x="11.4" y="5" width="2" height="2" rx="0.4" fill="#fff"/><rect x="6.6" y="8.2" width="2" height="2" rx="0.4" fill="#fff"/><rect x="11.4" y="8.2" width="2" height="2" rx="0.4" fill="#fff"/><rect x="8.5" y="11.6" width="3" height="4.9" rx="0.4" fill="#fff"/></svg>'
    };

    var HOUSE =
      '<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<rect x="4" y="3" width="12" height="15" rx="1.4" fill="#FFFFFF"/>' +
        '<rect x="6.1" y="5.3" width="2.6" height="2.6" rx="0.5" fill="#FFC84D"/>' +
        '<rect x="11.3" y="5.3" width="2.6" height="2.6" rx="0.5" fill="#64A7FF"/>' +
        '<rect x="6.1" y="9.3" width="2.6" height="2.6" rx="0.5" fill="#64A7FF"/>' +
        '<rect x="11.3" y="9.3" width="2.6" height="2.6" rx="0.5" fill="#FFC84D"/>' +
        '<rect x="8.3" y="13.3" width="3.4" height="4.7" rx="0.5" fill="#313D4C"/>' +
      '</svg>';

    var els = {
      skeleton: document.getElementById('listSkeleton'),
      hero:     document.getElementById('heroCard'),
      controls: document.getElementById('listControls'),
      search:   document.getElementById('searchInput'),
      channelFilter: document.getElementById('channelFilter'),
      gridSec:  document.getElementById('gridSection'),
      grid:     document.getElementById('reportsGrid'),
      noResults:document.getElementById('noResults'),
      pagination: document.getElementById('pagination'),
      empty:    document.getElementById('emptyState')
    };

    var CH_META = {
      '청년주택': { cls: 'youth',   label: '청년주택' },
      '줍줍분양': { cls: 'bunyang', label: '줍줍분양' }
    };
    function channelMeta(ch) { return CH_META[ch] || { cls: 'youth', label: ch || '청년주택' }; }
    function channelLabel(r) { var m = channelMeta(r.channel); return r.category || m.label; }
    // 줍줍분양 채널 안에서도 '민간임대' 카테고리는 별도 색상·아이콘을 씀
    function badgeCls(r) {
      var m = channelMeta(r.channel);
      if (m.cls === 'bunyang' && r.category === '민간임대') return 'minjian';
      return m.cls;
    }
    function channelBadgeHTML(r) {
      var cls = badgeCls(r);
      return '<span class="channel-badge channel-badge--' + cls + '">' + CH_ICON[cls] + esc(channelLabel(r)) + '</span>';
    }
    function heroChannelBadgeHTML(r) {
      var cls = badgeCls(r);
      return '<span class="hero-channel-badge hero-channel-badge--' + cls + '">' + CH_ICON[cls] + esc(channelLabel(r)) + '</span>';
    }

    var ALL = [];
    var query = '';
    var sortMode = 'latest';
    var channelMode = 'all';
    var page = 1;

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function slugKey(slug) { var m = /^(\d{8})/.exec(slug || ''); return m ? m[1] : '00000000'; }
    function deadlineNum(r) { return r.applyEndISO ? Number(r.applyEndISO.replace(/-/g, '')) : Infinity; }

    function computeStatus(iso) {
      if (!iso) return null;
      var p = iso.split('-').map(Number);
      if (p.length < 3 || p.some(isNaN)) return null;
      var end = new Date(p[0], p[1] - 1, p[2]); end.setHours(0, 0, 0, 0);
      var today = new Date(); today.setHours(0, 0, 0, 0);
      var diff = Math.round((end - today) / 86400000);
      if (diff < 0) return { kind: 'closed', label: '마감' };
      if (diff === 0) return { kind: 'urgent', label: '마감임박 · D-DAY' };
      if (diff <= 3) return { kind: 'urgent', label: '마감임박 · D-' + diff };
      return { kind: 'open', label: '모집중 · D-' + diff };
    }
    function fmtDeadline(iso) { return iso ? iso.replace(/-/g, '.') + ' 마감' : ''; }

    function href(slug) { return 'report.html?slug=' + encodeURIComponent(slug); }

    function heroHTML(r, isFeatured) {
      var st = r.status;
      var stBadge = st ? '<span class="hero-status hero-status--' + st.kind + '">' + esc(st.label) + '</span>' : '';
      var dl = r.applyEndISO ? '<span class="hero-report-deadline">' + ICON.cal + esc(fmtDeadline(r.applyEndISO)) + '</span>' : '';
      var ribbon = isFeatured ? '추천 리포트' : '최신 리포트';
      return '<a href="' + href(r.slug) + '" class="hero-report-card">' +
        '<div class="hero-report-inner">' +
          '<div class="hero-report-content">' +
            '<div class="hero-badge-row"><span class="report-badge">' + ribbon + '</span>' + heroChannelBadgeHTML(r) + stBadge + '</div>' +
            '<h2 class="hero-report-title">' + esc(r.title) + '</h2>' +
            '<p class="hero-report-subtitle">' + esc(r.subtitle) + '</p>' +
            '<div class="hero-report-meta">' + dl + '</div>' +
          '</div>' +
          '<div class="hero-report-icon">' + HOUSE + '</div>' +
        '</div></a>';
    }

    function cardHTML(r) {
      var st = r.status;
      var stBadge = st ? '<span class="status-badge status-badge--' + st.kind + '">' + esc(st.label) + '</span>' : '';
      var dl = r.applyEndISO ? ICON.cal + '<span>' + esc(fmtDeadline(r.applyEndISO)) + '</span>' : '';
      return '<a href="' + href(r.slug) + '" class="report-card-item' + (st && st.kind === 'closed' ? ' is-closed' : '') + '">' +
        '<div class="report-card-status">' + channelBadgeHTML(r) + stBadge + '</div>' +
        '<h3 class="report-card-title">' + esc(r.title) + '</h3>' +
        '<p class="report-card-subtitle">' + esc(r.subtitle) + '</p>' +
        '<div class="report-card-foot">' + dl + '</div>' +
      '</a>';
    }

    function renderPagination(totalPages) {
      if (totalPages <= 1) { els.pagination.style.display = 'none'; els.pagination.innerHTML = ''; return; }
      var h = '<button type="button" class="pg-btn" data-pg="' + (page - 1) + '"' + (page === 1 ? ' disabled' : '') + ' aria-label="이전 페이지">' + ICON.chevL + '</button>';
      for (var p = 1; p <= totalPages; p++) {
        h += '<button type="button" class="pg-num' + (p === page ? ' active' : '') + '" data-pg="' + p + '"' + (p === page ? ' aria-current="page"' : '') + '>' + p + '</button>';
      }
      h += '<button type="button" class="pg-btn" data-pg="' + (page + 1) + '"' + (page === totalPages ? ' disabled' : '') + ' aria-label="다음 페이지">' + ICON.chevR + '</button>';
      els.pagination.style.display = 'flex';
      els.pagination.innerHTML = h;
    }

    function pickHero() {
      var featured = ALL.filter(function (r) { return r.featured; });
      if (featured.length) return { report: featured[0], isFeatured: true };
      if (!ALL.length) return null;
      var sorted = ALL.slice().sort(function (a, b) { return slugKey(b.slug).localeCompare(slugKey(a.slug)); });
      return { report: sorted[0], isFeatured: false };
    }

    function render() {
      var q = query.trim().toLowerCase();
      var base = ALL.slice();
      if (channelMode !== 'all') base = base.filter(function (r) { return (r.channel || '청년주택') === channelMode; });
      if (q) base = base.filter(function (r) { return (r.title + ' ' + r.subtitle).toLowerCase().indexOf(q) !== -1; });

      if (sortMode === 'open') {
        base = base.filter(function (r) { return r.status && r.status.kind !== 'closed'; });
        base.sort(function (a, b) { return deadlineNum(a) - deadlineNum(b); });
      } else {
        base.sort(function (a, b) { return slugKey(b.slug).localeCompare(slugKey(a.slug)); });
      }

      // 히어로는 필터·정렬·검색과 무관하게 항상 표시(지정된 추천 리포트, 없으면 전체 중 최신)
      // 그리드는 히어로 여부와 무관하게 현재 필터 기준 전체를 그대로 보여줌(중복 노출 의도됨)
      var hero = pickHero();
      if (hero) {
        els.hero.innerHTML = heroHTML(hero.report, hero.isFeatured);
        els.hero.style.display = 'block';
      } else {
        els.hero.style.display = 'none';
        els.hero.innerHTML = '';
      }
      var gridItems = base;

      var totalPages = Math.max(1, Math.ceil(gridItems.length / PAGE_SIZE));
      if (page > totalPages) page = totalPages;
      if (page < 1) page = 1;
      var pageItems = gridItems.slice((page - 1) * PAGE_SIZE, (page - 1) * PAGE_SIZE + PAGE_SIZE);

      els.grid.innerHTML = pageItems.map(cardHTML).join('');
      for (var i = 0; i < els.grid.children.length; i++) els.grid.children[i].style.setProperty('--i', i);

      var hasResults = gridItems.length > 0;
      els.gridSec.style.display = 'block';
      els.grid.style.display = hasResults ? 'grid' : 'none';
      els.noResults.style.display = hasResults ? 'none' : 'block';
      els.noResults.textContent = q ? '검색 결과가 없어요.' : (sortMode === 'open' ? '진행 중인 공고가 없어요.' : '표시할 리포트가 없어요.');

      renderPagination(totalPages);
    }

    function renderChannelFilter() {
      var channels = [];
      ALL.forEach(function (r) {
        var ch = r.channel || '청년주택';
        if (channels.indexOf(ch) === -1) channels.push(ch);
      });
      if (channels.length < 2) { els.channelFilter.style.display = 'none'; return; }

      var options = ['all'].concat(channels);
      var h = options.map(function (ch) {
        var count = ch === 'all' ? ALL.length : ALL.filter(function (r) { return (r.channel || '청년주택') === ch; }).length;
        var label = ch === 'all' ? '전체' : channelMeta(ch).label;
        return '<button type="button" class="ch-filter-btn' + (ch === channelMode ? ' active' : '') + '" data-channel="' + esc(ch) + '" aria-pressed="' + (ch === channelMode) + '">' +
          esc(label) + ' <span class="ch-filter-count">' + count + '</span></button>';
      }).join('');
      els.channelFilter.innerHTML = h;
      els.channelFilter.style.display = 'flex';

      var btns = els.channelFilter.querySelectorAll('.ch-filter-btn');
      Array.prototype.forEach.call(btns, function (btn) {
        btn.addEventListener('click', function () {
          if (btn.classList.contains('active')) return;
          Array.prototype.forEach.call(btns, function (b) { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
          btn.classList.add('active'); btn.setAttribute('aria-pressed', 'true');
          channelMode = btn.getAttribute('data-channel'); page = 1; render();
        });
      });
    }

    function bind() {
      els.search.addEventListener('input', function (e) { query = e.target.value; page = 1; render(); });
      var btns = els.controls.querySelectorAll('.sort-btn');
      Array.prototype.forEach.call(btns, function (btn) {
        btn.addEventListener('click', function () {
          if (btn.classList.contains('active')) return;
          Array.prototype.forEach.call(btns, function (b) { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
          btn.classList.add('active'); btn.setAttribute('aria-pressed', 'true');
          sortMode = btn.getAttribute('data-sort'); page = 1; render();
        });
      });
      renderChannelFilter();
      els.pagination.addEventListener('click', function (e) {
        var b = e.target.closest('[data-pg]');
        if (!b || b.disabled) return;
        var p = Number(b.getAttribute('data-pg'));
        if (!p || p === page) return;
        page = p; render();
        els.gridSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }

    function loadIndex() {
      fetch('reports/index.json')
        .then(function (res) { return res.json(); })
        .then(function (data) {
          var reports = (data && data.reports) || [];
          els.skeleton.style.display = 'none';

          if (!reports.length) { els.empty.style.display = 'block'; return; }

          ALL = reports.map(function (r) {
            r.status = computeStatus(r.applyEndISO);
            return r;
          });

          if (ALL.length > 1) els.controls.style.display = 'flex';
          bind();
          render();
        })
        .catch(function (e) {
          console.error(e);
          els.skeleton.style.display = 'none';
          els.empty.style.display = 'block';
        });
    }

    loadIndex();
  })();
  </script>
</body>
</html>
