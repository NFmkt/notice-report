<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리포트 제목 | 공고 분석 리포트</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Pretendard Variable (모든 폰트 통일) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

  <link rel="stylesheet" href="css/design-system.css?v=2">
  <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>

  <!-- ① 헤더: 뷰 토글 + 스크롤 프로그레스바 -->
  <header class="site-header">
    <div class="header-inner">
      <a class="header-logo" href="index.html" aria-label="공고 분석 리포트 홈">
        <svg class="header-logo-icon" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M5.5 2.5A1.5 1.5 0 0 1 7 1h3.17a1.5 1.5 0 0 1 1.06.44l2.83 2.83A1.5 1.5 0 0 1 14.5 5.33V17.5A1.5 1.5 0 0 1 13 19H7a1.5 1.5 0 0 1-1.5-1.5v-15Z" fill="currentColor"/>
          <path d="M10.5 1.2V4.5A1.5 1.5 0 0 0 12 6h3.3L10.5 1.2Z" fill="currentColor" opacity="0.35"/>
          <rect x="7.3" y="9" width="5.4" height="1.3" rx="0.65" fill="#fff"/>
          <rect x="7.3" y="11.6" width="5.4" height="1.3" rx="0.65" fill="#fff"/>
          <rect x="7.3" y="14.2" width="3.6" height="1.3" rx="0.65" fill="#fff"/>
        </svg>
        <span class="header-logo-text">공고 분석 리포트</span>
      </a>
      <div class="header-right">
        <a class="back-home-link" href="index.html" aria-label="목록으로 돌아가기">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          <span>목록</span>
        </a>
        <button class="share-btn" id="shareBtn" aria-label="리포트 공유">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          공유
        </button>
      </div>
    </div>
    <div class="progress-bar" id="progressBar"></div>
  </header>

  <!-- ② 리포트 타이틀 히어로 -->
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-content">
        <div class="hero-badge">공고 분석 리포트</div>
        <h1 class="hero-title" id="reportTitle"><span class="skeleton skeleton-title"></span></h1>
        <p class="hero-subtitle" id="reportSubtitle"><span class="skeleton skeleton-subtitle"></span></p>
      </div>
    </div>
  </section>

  <!-- ③ 뷰 컨테이너 -->
  <main class="view-container">

    <!-- 매거진 뷰 (기본 활성) -->
    <div class="view magazine-view active" id="magazineView">
      <!-- 좌측 목차 사이드바 -->
      <aside class="section-index" id="sectionIndex">
        <p class="section-index-title">목차</p>
        <ul class="section-index-list" id="sectionIndexList">
          <!-- JS로 동적 삽입 예정 -->
          <li><a href="#">섹션이 로드되면 표시됩니다</a></li>
        </ul>
      </aside>

      <!-- 우측 본문 -->
      <article class="article-body">
        <div id="loadingSkeleton" class="loading-skeleton">
          <div class="skeleton-section">
            <div class="skeleton skeleton-line w-40"></div>
            <div class="skeleton skeleton-line w-80"></div>
            <div class="skeleton skeleton-line w-60"></div>
          </div>
          <div class="skeleton-section">
            <div class="skeleton skeleton-line w-30"></div>
            <div class="skeleton skeleton-line w-90"></div>
            <div class="skeleton skeleton-line w-70"></div>
            <div class="skeleton skeleton-line w-50"></div>
          </div>
        </div>
        <div id="summaryCard"></div>
        <div id="introBlock"></div>
        <div id="articleBody"></div>
        <div id="outroBlock"></div>
      </article>
    </div>


  </main>

  <!-- ④ 푸터 -->
  <footer class="site-footer">
    <p>© 고방 (gobang.kr)</p>
  </footer>

  <script type="module" src="js/app.js"></script>

<!-- Mobile TOC FAB + Drawer -->
<button class="toc-fab" id="tocFab" aria-label="목차 열기" aria-expanded="false">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
    <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
  </svg>
</button>

<div class="toc-drawer" id="tocDrawer" aria-hidden="true">
  <div class="toc-drawer-handle"></div>
  <div class="toc-drawer-inner">
    <p class="toc-drawer-title">목차</p>
    <ul class="toc-drawer-list" id="tocDrawerList"></ul>
  </div>
</div>
<div class="toc-overlay" id="tocOverlay"></div>
<div class="share-toast" id="shareToast" role="status" aria-live="polite">링크가 복사됐어요!</div>
</body>
</html>
